name: MobileRecorder
options:
  bundleIdPrefix: com.garnetuniverse
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    DEVELOPMENT_TEAM: YB6QDSJBRU
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  SwiftyDropbox:
    url: https://github.com/dropbox/SwiftyDropbox.git
    exactVersion: 9.2.0
  whisper:
    url: https://github.com/ggerganov/whisper.spm
    branch: master
targets:
  MobileRecorder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    attributes:
      DevelopmentTeam: YB6QDSJBRU
      ProvisioningStyle: Automatic
    sources:
      - path: ../ios/MobileRecorder
      - path: ../ios/Shared
    info:
      path: ../ios/MobileRecorder/Info.plist
      properties:
        CFBundleDisplayName: LukeMobileRecoder
        NSMicrophoneUsageDescription: LukeMobileRecorder uses the microphone to record your voice and send recordings to your selected transcription folder.
        NSSpeechRecognitionUsageDescription: LukeMobileRecorder can show live speech text while you record so you can confirm what was captured before sending.
        UILaunchScreen:
          UIColorName: LaunchBackground
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garnetuniverse.MobileRecorder
        PRODUCT_NAME: MobileRecorder
        DEVELOPMENT_TEAM: YB6QDSJBRU
        CODE_SIGN_STYLE: Automatic
        APP_DISPLAY_NAME: LukeMobileRecoder
        APP_URL_SCHEME: mobilerecorder
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: MobileRecorderControl
        embed: true
      - package: SwiftyDropbox
      - package: whisper
  Memo2Computah:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    attributes:
      DevelopmentTeam: YB6QDSJBRU
      ProvisioningStyle: Automatic
    sources:
      - path: ../ios/Memo2Computah
    info:
      path: ../ios/Memo2Computah/Info.plist
      properties:
        CFBundleDisplayName: Memo2Computah
        NSMicrophoneUsageDescription: Memo2Computah uses the microphone to record your voice and send recordings to your selected computer endpoint.
        NSSpeechRecognitionUsageDescription: Memo2Computah can show live speech text while you record so you can confirm what was captured before sending.
        CFBundleURLTypes:
          - CFBundleURLName: com.garnetuniverse.Memo2Computah.dropbox
            CFBundleURLSchemes:
              - db-5ly9ju548yuntzq
          - CFBundleURLName: com.garnetuniverse.Memo2Computah.app
            CFBundleURLSchemes:
              - memo2computah
        LSApplicationQueriesSchemes:
          - dbapi-2
          - dbapi-8-emm
        UILaunchScreen:
          UIColorName: LaunchBackground
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garnetuniverse.Memo2Computah
        PRODUCT_NAME: Memo2Computah
        DEVELOPMENT_TEAM: YB6QDSJBRU
        CODE_SIGN_STYLE: Automatic
        APP_DISPLAY_NAME: Memo2Computah
        APP_URL_SCHEME: memo2computah
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: Memo2ComputahControl
        embed: true
      - package: SwiftyDropbox
      - package: whisper
  Memo2ComputahControl:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    attributes:
      DevelopmentTeam: YB6QDSJBRU
      ProvisioningStyle: Automatic
    sources:
      - path: ../ios/Memo2ComputahControl
    info:
      path: ../ios/Memo2ComputahControl/Info.plist
      properties:
        CFBundleDisplayName: Memo2 Control
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garnetuniverse.Memo2Computah.Control
        PRODUCT_NAME: Memo2ComputahControl
        DEVELOPMENT_TEAM: YB6QDSJBRU
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
  MobileRecorderControl:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    attributes:
      DevelopmentTeam: YB6QDSJBRU
      ProvisioningStyle: Automatic
    sources:
      - path: ../ios/MobileRecorderControl
      - path: ../ios/Shared
      - path: ../ios/MobileRecorder/RecordingLaunchCoordinator.swift
    info:
      path: ../ios/MobileRecorderControl/Info.plist
      properties:
        CFBundleDisplayName: LukeMobileRecoder Control
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garnetuniverse.MobileRecorder.Control
        PRODUCT_NAME: MobileRecorderControl
        DEVELOPMENT_TEAM: YB6QDSJBRU
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
  AutoTranscribeCompanion:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    attributes:
      DevelopmentTeam: YB6QDSJBRU
      ProvisioningStyle: Automatic
    sources:
      - path: ../macos/AutoTranscribeCompanion
    info:
      path: ../macos/AutoTranscribeCompanion/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garnetuniverse.AutoTranscribeCompanion
        PRODUCT_NAME: AutoTranscribeCompanion
        DEVELOPMENT_TEAM: YB6QDSJBRU
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
  Memo2ComputahDesktop:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    attributes:
      DevelopmentTeam: YB6QDSJBRU
      ProvisioningStyle: Automatic
    sources:
      - path: ../macos/Memo2ComputahDesktop
    info:
      path: ../macos/Memo2ComputahDesktop/Info.plist
      properties:
        CFBundleDisplayName: Memo2Computah Desktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garnetuniverse.Memo2ComputahDesktop
        PRODUCT_NAME: Memo2ComputahDesktop
        DEVELOPMENT_TEAM: YB6QDSJBRU
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
schemes:
  MobileRecorder:
    build:
      targets:
        MobileRecorder: all
  Memo2Computah:
    build:
      targets:
        Memo2Computah: all
  AutoTranscribeCompanion:
    build:
      targets:
        AutoTranscribeCompanion: all
  Memo2ComputahDesktop:
    build:
      targets:
        Memo2ComputahDesktop: all
